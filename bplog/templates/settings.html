{% extends "base.html" %}
{% block title %}BPLog — Settings{% endblock %}
{% block body %}
<h2>Settings</h2>
<form method="post" action="{{ url_for('settings_ui.save', t=url_token) }}">
  <fieldset>
    <legend>Identity</legend>
    <label>Name <input type="text" name="user_name" value="{{ settings.user_name }}" required></label>
    <label>Birth date <input type="date" name="birth_date" value="{{ settings.birth_date.strftime('%Y-%m-%d') if settings.birth_date else '' }}" required></label>
  </fieldset>

  <fieldset>
    <legend>Server</legend>
    <label>Bind address <input type="text" name="bind_address" value="{{ settings.server.bind_address }}"></label>
    <p class="hint">Restart required for changes to take effect.</p>
  </fieldset>

  <fieldset>
    <legend>Reminders</legend>
    <label class="checkbox"><input type="checkbox" name="reminders_enabled" {% if settings.reminders.enabled %}checked{% endif %}> Enabled</label>
    <label>Times (HH:MM, comma-separated)
      <input type="text" name="reminder_times" value="{{ settings.reminders.times|map('string')|join(', ') }}">
    </label>
  </fieldset>

  <fieldset>
    <legend>Vision</legend>
    <label>Anthropic model <input type="text" name="vision_model" value="{{ settings.vision_model }}"></label>
    <p class="hint">Set <code>ANTHROPIC_API_KEY</code> in the environment to enable photo extraction.</p>
  </fieldset>

  <button type="submit">Save</button>
  <a href="{{ url_for('readings.index', t=url_token) }}">Cancel</a>
</form>
{% endblock %}
