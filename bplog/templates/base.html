<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}BPLog{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <h1><a href="{{ url_for('readings.index') }}">BPLog</a></h1>
  <nav>
    <a href="{{ url_for('settings_ui.edit') }}">Settings</a>
    <a href="{{ url_for('exports.text') }}">Export Text</a>
    <a href="{{ url_for('exports.html') }}">Export HTML</a>
  </nav>
</header>
{% if reminder_banner %}
<div class="reminder-banner">
  <span>{{ reminder_banner }}</span>
  <form method="post" action="/reminders/dismiss" class="inline">
    <button type="submit">Dismiss</button>
  </form>
</div>
{% endif %}
<main>
{% block body %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
